<svg width="280" height="560" viewBox="0 0 280 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone body -->
  <rect x="10" y="20" width="260" height="520" rx="40" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  
  <!-- Screen -->
  <rect x="20" y="50" width="240" height="460" rx="30" fill="#ffffff"/>
  
  <!-- Notch -->
  <rect x="110" y="50" width="60" height="25" rx="0" fill="#1a1a1a"/>
  
  <!-- Logo area on screen -->
  <rect x="20" y="50" width="240" height="100" fill="#FF6B35"/>
  
  <!-- Logo text -->
  <text x="140" y="110" font-size="28" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="Arial">WA XLE AHI</text>
  
  <!-- Content placeholder -->
  <rect x="40" y="180" width="200" height="12" rx="6" fill="#f0f0f0"/>
  <rect x="40" y="210" width="200" height="12" rx="6" fill="#f0f0f0"/>
  <rect x="40" y="240" width="160" height="12" rx="6" fill="#f0f0f0"/>
  
  <!-- Button on screen -->
  <rect x="40" y="310" width="200" height="50" rx="8" fill="#FF6B35"/>
  <text x="140" y="345" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="Arial">Courses 24h/24</text>
  
  <!-- More content -->
  <rect x="40" y="390" width="200" height="8" rx="4" fill="#f0f0f0"/>
  <rect x="40" y="410" width="200" height="8" rx="4" fill="#f0f0f0"/>
  <rect x="40" y="430" width="140" height="8" rx="4" fill="#f0f0f0"/>
  
  <!-- Home indicator -->
  <rect x="120" y="520" width="40" height="3" rx="2" fill="#000"/>
</svg>
